<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Painel de Ambientes</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-strong: #eef2f6;
      --text: #17202a;
      --muted: #637083;
      --line: #d9e0e7;
      --primary: #176b87;
      --primary-dark: #0e4f64;
      --accent: #c2452d;
      --ok: #1f8a5b;
      --shadow: 0 18px 40px rgba(23, 32, 42, 0.1);
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    a {
      color: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 22px;
      padding: 28px;
      background: var(--panel);
      border-right: 1px solid var(--line);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 58px;
      border-bottom: 1px solid var(--line);
    }

    .brand h1 {
      margin: 0;
      font-size: 1.65rem;
      font-weight: 720;
      letter-spacing: 0;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .nav-list {
      display: grid;
      gap: 34px;
    }

    .menu-section {
      display: grid;
      gap: 18px;
    }

    .menu-title {
      margin: 0;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .env-button {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 58px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .env-button:hover,
    .env-button:focus-visible {
      border-color: var(--primary);
      box-shadow: 0 10px 24px rgba(23, 107, 135, 0.14);
      outline: none;
      transform: translateY(-1px);
    }

    .env-button.active {
      border-color: var(--primary);
      background: #f1f9fb;
      box-shadow: inset 4px 0 0 var(--primary);
    }

    .env-name {
      font-weight: 700;
      line-height: 1.2;
    }

    .workspace {
      display: grid;
      grid-template-rows: minmax(420px, 1fr);
      padding: 28px;
      min-width: 0;
    }

    .viewer {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .viewer {
      position: relative;
      overflow: hidden;
      min-height: 420px;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 148px);
      border: 0;
      background: #ffffff;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .nav-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: start;
      }

      .workspace {
        padding-top: 20px;
      }
    }

    @media (max-width: 640px) {
      .sidebar,
      .workspace {
        padding: 18px;
      }

      .nav-list {
        grid-template-columns: 1fr;
      }

    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar" aria-label="Ambientes disponíveis">
      <section class="brand">
        <h1>Painel de Ambientes</h1>
        <p>Acesso rápido para abrir e conferir as páginas locais de cada ambiente.</p>
      </section>

      <nav class="nav-list" id="environment-list"></nav>
    </aside>

    <section class="workspace" aria-label="Visualização do ambiente">
      <section class="viewer">
        <iframe id="preview" title="Previa do ambiente selecionado"></iframe>
      </section>
    </section>
  </main>

  <script>
    const menuSections = [
      {
        title: "Servidor",
        environments: [
          {
            name: "Servidor Lumini",
            file: "srv-lumini.html"
          },
          {
            name: "Sistemas",
            file: "srv-sistemas.html"
          }
        ]
      },
      {
        title: "Fabrica",
        environments: [
          {
            name: "Matriz",
            file: "ljfabrica.html"
          }
        ]
      },
      {
        title: "Lojas",
        environments: [
          {
            name: "LUMINI | Shooping D&D",
            file: "ljshooping.html"
          },
          {
            name: "LUMINI | Rio de Janeiro",
            file: "ljrio.html"
          },
          {
            name: "LUMINI | Loja Gabriel",
            file: "ljgabriel.html"
          }
        ]
      }
    ];

    const environments = menuSections.flatMap((section) => section.environments);

    const list = document.querySelector("#environment-list");
    const preview = document.querySelector("#preview");

    function selectEnvironment(index) {
      const environment = environments[index];
      preview.src = environment.file;

      document.querySelectorAll(".env-button").forEach((button, buttonIndex) => {
        button.classList.toggle("active", buttonIndex === index);
        button.setAttribute("aria-pressed", buttonIndex === index ? "true" : "false");
      });
    }

    let environmentIndex = 0;

    menuSections.forEach((section) => {
      const sectionElement = document.createElement("section");
      sectionElement.className = "menu-section";

      const heading = document.createElement("h2");
      heading.className = "menu-title";
      heading.textContent = section.title;
      sectionElement.appendChild(heading);

      section.environments.forEach((environment) => {
        const button = document.createElement("button");
        const currentIndex = environmentIndex;

        button.type = "button";
        button.className = "env-button";
        button.setAttribute("aria-pressed", "false");
        button.innerHTML = `<span class="env-name">${environment.name}</span>`;
        button.addEventListener("click", () => selectEnvironment(currentIndex));
        sectionElement.appendChild(button);

        environmentIndex += 1;
      });

      list.appendChild(sectionElement);
    });

    selectEnvironment(0);
  </script>
</body>
</html>
